function d64(s){return Uint8Array.from(atob(s),c=>c.charCodeAt(0));}
async function go(){
 const pw=document.getElementById('pw').value;const err=document.getElementById('err');err.textContent='';
 try{
  const enc=new TextEncoder();
  const km=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:d64(ENC.salt),iterations:ENC.iter,hash:'SHA-256'},
    km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:d64(ENC.iv)},key,d64(ENC.ct));
  const html=new TextDecoder().decode(pt);
  document.open();document.write(html);document.close();
 }catch(e){err.textContent='Wrong passphrase';}
}
document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
